<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <title>Product Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
  </style>
</head>
<body>
  <article class="product-preview">
    <div class="img-container">
      <img class="product-img" src="./assets/image-product-desktop.jpg" alt="product image">
      <img class="product-img-mobile" src="./assets/image-product-mobile.jpg" alt="product image">
    </div>

    <div class="product-details">
      <p class="category montserrat-medium">PERFUME</p>
      <h1 class="fraunces-normal product-title">Gabrielle Essence Eau De Parfum</h1>

      <p class="product-desc montserrat-medium">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
      Perfumer-Creator for the House of CHANEL.</p>

      <div class="price">
        <p class="product-discount fraunces-normal">$149.99</p>
        <p class="product-price montserrat-medium">$169.99</p>
      </div>

      <button class="btn-add-cart montserrat-bold">
        <img class="cart-icon" src="./assets/icon-cart.svg" alt="cart">
        <span>Add to Cart</span>
      </button>
    </div>
  </article>  
</body>
</html>
