<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Product Preview</title>
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <article class="product-preview">
      <div class="img-container">
        <img class="product-img" src="./assets/image-product-desktop.jpg" alt="">
        <img class="product-img-mobile" src="./assets/image-product-mobile.jpg">
      </div>

      <div class="product-details">
        <p class="category">Perfume</p>
        <h1 class="montserrat-bold">Gabrielle Essence Eau De Parfum</h1>

        <p class="product-desc">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>

        <div class="price">
          <p class="product-discount">$149.99</p>
          <p class="product-price">$169.99</p>
        </div>

        <a href="">Add to Cart</a>
      </div>
    </article>
    
    <!-- <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    </footer> -->
  </main>
</body>
</html>
